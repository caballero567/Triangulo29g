    // ⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️⬆️

    // Optimización: Cache de referencias DOM
    const DOM = {
        supervisorSelect: document.getElementById('supervisorSelect'),
        vendedorSelect: document.getElementById('vendedorDinamico'),
        codigoInput: document.getElementById('codigoClienteInput'),
        diaSelect: document.getElementById('diaVisitaSelect'),
        cardContainer: document.getElementById('cardContainer'),
        totalItems: document.getElementById('totalMobileItems'),
        resultCounter: document.getElementById('resultCounter')
    };

    // Cache de datos precalculados para mejorar rendimiento
    let supervisoresCache = null;
    let vendedoresPorSupervisorCache = new Map();

    function precalcularCaches() {
        // Cache de supervisores únicos
        if (!supervisoresCache) {
            const supervisoresSet = new Set();
            for (let i = 0; i < fullData.length; i++) {
                const sup = fullData[i].Supervisor;
                if (sup && sup.trim() !== "") {
                    supervisoresSet.add(sup);
                }
            }
            supervisoresCache = Array.from(supervisoresSet).sort();
        }
        
        // Cache de vendedores por supervisor
        vendedoresPorSupervisorCache.clear();
        const tempMap = new Map();
        for (let i = 0; i < fullData.length; i++) {
            const item = fullData[i];
            const sup = item.Supervisor;
            const ven = item.Vendedor;
            if (!tempMap.has(sup)) {
                tempMap.set(sup, new Set());
            }
            tempMap.get(sup).add(ven);
        }
        for (let [sup, vendedoresSet] of tempMap) {
            vendedoresPorSupervisorCache.set(sup, Array.from(vendedoresSet).sort());
        }
        // Para "todos" los supervisores
        const allVendedoresSet = new Set();
        for (let i = 0; i < fullData.length; i++) {
            allVendedoresSet.add(fullData[i].Vendedor);
        }
        vendedoresPorSupervisorCache.set('__ALL__', Array.from(allVendedoresSet).sort());
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function populateSupervisores() {
        precalcularCaches();
        const selectEl = DOM.supervisorSelect;
        selectEl.innerHTML = '<option value="">Todos los supervisores</option>';
        
        for (let i = 0; i < supervisoresCache.length; i++) {
            const sup = supervisoresCache[i];
            const option = document.createElement('option');
            option.value = sup;
            option.textContent = sup;
            selectEl.appendChild(option);
        }
    }

    function getVendedoresBySupervisor(supervisorValue) {
        if (!supervisorValue) {
            return vendedoresPorSupervisorCache.get('__ALL__') || [];
        } else {
            return vendedoresPorSupervisorCache.get(supervisorValue) || [];
        }
    }

    function updateVendedorDropdown() {
        const selectedSupervisor = DOM.supervisorSelect.value;
        const vendedoresList = getVendedoresBySupervisor(selectedSupervisor);
        const vendedorSelect = DOM.vendedorSelect;
        const currentSelectedVendedor = vendedorSelect.value;
        
        vendedorSelect.innerHTML = '<option value="">Todos los vendedores</option>';
        
        for (let i = 0; i < vendedoresList.length; i++) {
            const v = vendedoresList[i];
            const option = document.createElement('option');
            option.value = v;
            option.textContent = v;
            vendedorSelect.appendChild(option);
        }
        
        if (currentSelectedVendedor && vendedoresList.includes(currentSelectedVendedor)) {
            vendedorSelect.value = currentSelectedVendedor;
        } else {
            vendedorSelect.value = '';
        }
    }

    function getFilteredData() {
        const supervisor = DOM.supervisorSelect.value;
        const vendedor = DOM.vendedorSelect.value;
        const codigoCliente = DOM.codigoInput.value.trim().toLowerCase();
        const dia = DOM.diaSelect.value;
        
        const result = [];
        for (let i = 0; i < fullData.length; i++) {
            const item = fullData[i];
            if (supervisor !== "" && item.Supervisor !== supervisor) continue;
            if (vendedor !== "" && item.Vendedor !== vendedor) continue;
            if (codigoCliente !== "" && !item.ClienteCodigo.toLowerCase().includes(codigoCliente)) continue;
            if (dia !== "" && item.Dia !== dia) continue;
            result.push(item);
        }
        return result;
    }

    function renderCards(dataArr) {
        const container = DOM.cardContainer;
        const totalSpan = DOM.totalItems;
        const counterSpan = DOM.resultCounter;
        totalSpan.innerText = dataArr.length;
        counterSpan.innerText = dataArr.length;

        if (dataArr.length === 0) {
            container.innerHTML = `<div class="empty-state-mobile"><i class="fas fa-chart-simple" style="font-size: 2rem; opacity:0.7;"></i><p style="margin-top: 12px;">Sin resultados<br>Ajusta los filtros</p></div>`;
            return;
        }

        let html = '';
        for (let i = 0; i < dataArr.length; i++) {
            const item = dataArr[i];
            html += `
                <div class="route-card">
                    <div class="card-badge-row">
                        <span class="codigo-badge"><i class="fas fa-barcode"></i> ${escapeHtml(item.ClienteCodigo)}</span>
                        <span class="vendedor-tag"><i class="fas fa-id-card"></i> ${escapeHtml(item.Vendedor)}</span>
                    </div>
                    <div class="cliente-name">
                        <i class="fas fa-user-friends"></i> ${escapeHtml(item.cliente)}
                    </div>
                    <div class="info-grid">
                        <div class="info-item"><i class="fas fa-warehouse"></i> ${escapeHtml(item.Canal)}</div>
                        <div class="info-item"><i class="fas fa-tag"></i> ${escapeHtml(item.Tipo)}</div>
                        <div class="info-item supervisor-highlight"><i class="fas fa-user-check"></i> ${escapeHtml(item.Supervisor)}</div>
                        <div class="info-item"><i class="fas fa-calendar-alt"></i> ${escapeHtml(item.Dia)}</div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function applyFilters() {
        const filtered = getFilteredData();
        renderCards(filtered);
    }

    function resetFilters() {
        DOM.supervisorSelect.value = '';
        updateVendedorDropdown();
        DOM.vendedorSelect.value = '';
        DOM.codigoInput.value = '';
        DOM.diaSelect.value = '';
        renderCards(fullData);
    }

    function onSupervisorChange() {
        updateVendedorDropdown();
        applyFilters();
    }

    document.addEventListener('DOMContentLoaded', () => {
        populateSupervisores();
        updateVendedorDropdown();
        renderCards(fullData);
        
        DOM.supervisorSelect.addEventListener('change', onSupervisorChange);
        DOM.vendedorSelect.addEventListener('change', () => applyFilters());
        DOM.codigoInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') applyFilters(); });
        DOM.diaSelect.addEventListener('change', () => applyFilters());
        document.getElementById('applyFiltersBtn').addEventListener('click', applyFilters);
        document.getElementById('resetFiltersBtn').addEventListener('click', resetFilters);
    });
</script>
</body>
</html>
