    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== FUNCIÓN CLAVE: Obtener supervisores únicos de los datos ==========
    function populateSupervisores() {
        const supervisoresSet = new Set();
        fullData.forEach(item => {
            if (item.Supervisor && item.Supervisor.trim() !== "") {
                supervisoresSet.add(item.Supervisor);
            }
        });
        const supervisoresList = Array.from(supervisoresSet).sort();
        const selectEl = document.getElementById('supervisorSelect');
        
        // Mantener la opción "Todos los supervisores"
        selectEl.innerHTML = '<option value="">Todos los supervisores</option>';
        
        supervisoresList.forEach(sup => {
            const option = document.createElement('option');
            option.value = sup;
            // Mostrar conteo de clientes por supervisor
            const count = fullData.filter(item => item.Supervisor === sup).length;
            option.textContent = `${sup} (${count} clientes)`;
            selectEl.appendChild(option);
        });
    }

    function getVendedoresBySupervisor(supervisorValue) {
        if (!supervisorValue) {
            const allVendedores = [...new Set(fullData.map(item => item.Vendedor))];
            return allVendedores.sort();
        } else {
            const filtered = fullData.filter(item => item.Supervisor === supervisorValue);
            const vendedoresSet = new Set(filtered.map(item => item.Vendedor));
            return Array.from(vendedoresSet).sort();
        }
    }

    function updateVendedorDropdown() {
        const selectedSupervisor = document.getElementById('supervisorSelect').value;
        const vendedoresList = getVendedoresBySupervisor(selectedSupervisor);
        const vendedorSelect = document.getElementById('vendedorDinamico');
        const currentSelectedVendedor = vendedorSelect.value;
        
        vendedorSelect.innerHTML = '<option value="">Todos los vendedores</option>';
        vendedoresList.forEach(v => {
            const option = document.createElement('option');
            option.value = v;
            let count = fullData.filter(r => r.Vendedor === v && (selectedSupervisor ? r.Supervisor === selectedSupervisor : true)).length;
            option.textContent = `${v} (${count} rutas)`;
            vendedorSelect.appendChild(option);
        });
        if (currentSelectedVendedor && vendedoresList.includes(currentSelectedVendedor)) {
            vendedorSelect.value = currentSelectedVendedor;
        } else {
            vendedorSelect.value = '';
        }
    }

    function getFilteredData() {
        const supervisor = document.getElementById('supervisorSelect').value;
        const vendedor = document.getElementById('vendedorDinamico').value;
        const codigoCliente = document.getElementById('codigoClienteInput').value.trim().toLowerCase();
        const dia = document.getElementById('diaVisitaSelect').value;

        return fullData.filter(item => {
            if (supervisor !== "" && item.Supervisor !== supervisor) return false;
            if (vendedor !== "" && item.Vendedor !== vendedor) return false;
            if (codigoCliente !== "" && !item.ClienteCodigo.toLowerCase().includes(codigoCliente)) return false;
            if (dia !== "" && item.Dia !== dia) return false;
            return true;
        });
    }

    function renderCards(dataArr) {
        const container = document.getElementById('cardContainer');
        const totalSpan = document.getElementById('totalMobileItems');
        const counterSpan = document.getElementById('resultCounter');
        totalSpan.innerText = dataArr.length;
        counterSpan.innerText = dataArr.length;

        if (dataArr.length === 0) {
            container.innerHTML = `<div class="empty-state-mobile"><i class="fas fa-chart-simple" style="font-size: 2rem; opacity:0.7;"></i><p style="margin-top: 12px;">Sin resultados<br>Ajusta los filtros</p></div>`;
            return;
        }

        let html = '';
        for (let item of dataArr) {
            html += `
                <div class="route-card">
                    <div class="card-badge-row">
                        <span class="codigo-badge"><i class="fas fa-barcode"></i> ${escapeHtml(item.ClienteCodigo)}</span>
                        <span class="vendedor-tag"><i class="fas fa-id-card"></i> ${escapeHtml(item.Vendedor)}</span>
                    </div>
                    <div class="cliente-name">
                        <i class="fas fa-user-friends"></i> ${escapeHtml(item.cliente)}
                    </div>
                    <div class="info-grid">
                        <div class="info-item"><i class="fas fa-warehouse"></i> ${escapeHtml(item.Canal)}</div>
                        <div class="info-item"><i class="fas fa-tag"></i> ${escapeHtml(item.Tipo)}</div>
                        <div class="info-item supervisor-highlight"><i class="fas fa-user-check"></i> ${escapeHtml(item.Supervisor)}</div>
                        <div class="info-item"><i class="fas fa-calendar-alt"></i> ${escapeHtml(item.Dia)}</div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function applyFilters() {
        const filtered = getFilteredData();
        renderCards(filtered);
    }

    function resetFilters() {
        document.getElementById('supervisorSelect').value = '';
        updateVendedorDropdown();
        document.getElementById('vendedorDinamico').value = '';
        document.getElementById('codigoClienteInput').value = '';
        document.getElementById('diaVisitaSelect').value = '';
        renderCards(fullData);
    }

    function onSupervisorChange() {
        updateVendedorDropdown();
        applyFilters();
    }

    document.addEventListener('DOMContentLoaded', () => {
        // Primero poblar los supervisores desde los datos
        populateSupervisores();
        updateVendedorDropdown();
        renderCards(fullData);
        
        const supervisorEl = document.getElementById('supervisorSelect');
        const vendedorEl = document.getElementById('vendedorDinamico');
        const codigoInput = document.getElementById('codigoClienteInput');
        const diaSelect = document.getElementById('diaVisitaSelect');
        const applyBtn = document.getElementById('applyFiltersBtn');
        const resetBtn = document.getElementById('resetFiltersBtn');
        
        supervisorEl.addEventListener('change', onSupervisorChange);
        vendedorEl.addEventListener('change', () => applyFilters());
        codigoInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') applyFilters(); });
        diaSelect.addEventListener('change', () => applyFilters());
        applyBtn.addEventListener('click', applyFilters);
        resetBtn.addEventListener('click', resetFilters);
    });
</script>
</body>
</html>
